# Base
- type: entity
  abstract: true
  parent: BaseItem
  id: BaseForgeItemNoTemp
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Specific/forging.rsi

- type: entity
  abstract: true
  parent: [ BaseForgeItemNoTemp, BaseMetallic ]
  id: BaseForgeItem

- type: entity
  abstract: true
  parent: BaseForgeItem
  id: BaseMetalScraps
  description: Needs to be melted in a bloomery to be made useful.
  components:
  - type: Construction
    node: finish

- type: entity
  abstract: true
  parent: BaseForgeItem
  id: BaseMetalBloom
  description: Refine it by smashing it with a hammer into shape!
  components:
  - type: Metallic
    workable: true # starts with workable heat out of the bloomery
  - type: Workable
    remaining: 25
  # TODO: heat up whatever attacked it so you can't use a bat or whatever, have to use metal hammers
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ] # no ingot for you

- type: entity
  abstract: true
  parent: [ BaseForgeItem, MaterialBase ]
  id: BaseMetalIngot
  components:
  - type: Material
  - type: Stack
    count: 1
  - type: Tag
    tags: [ Ingot ]
  - type: MetallicTags
    workable: [ IngotWorkable ] # added while in the ideal temperature range
  - type: MetallicPopups
    heatedPopup: ingot-heated-popup-text
    cooledPopup: ingot-cooled-popup-text

# Brass - 850K +- 56K range of error

- type: entity
  abstract: true
  parent: BaseMetallicBrass
  id: BrassOverheatable
  components:
  - type: BurnableFood
    burnTemp: 906
    burnedFoodPrototype: OverheatedBrass
    burnedPrefix: heated-name-text
    burnSound: null

- type: entity
  parent: [ BaseMetalScraps, BaseMetallicBrass ]
  id: BrassScraps
  name: brass scraps
  components:
  - type: Tag
    tags:
    - BrassScraps # TODO: generic thing not fucking tags + lathe recipe
  - type: Sprite
    layers:
    - state: brass
      shader: Emissive
  - type: Construction
    graph: BrassScraps

- type: entity
  parent: [ BaseForgeItem, BaseMetallicBrass ]
  id: OverheatedBrass
  name: overheated brass
  description: The metal has overheated and become brittle, smash it apart to make it usable.
  components:
  - type: Damageable
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTypeTrigger
        damageType: Blunt
        damage: 25
      behaviors:
      - !type:SpawnEntitiesBehavior
        offset: 0
        spawn:
          BrassScraps:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Sprite
    layers:
    - state: brassbrittle
      shader: Emissive

- type: entity
  parent: [ BaseWorkableBrass, BaseMetalBloom, BrassOverheatable ]
  id: BrassBloom
  name: brass bloom
  components:
  - type: Sprite
    layers:
    - state: bloombrass
      shader: Emissive
  - type: Workable
    result: BrassIngot

- type: entity
  parent: [ BaseMetalIngot, BrassOverheatable]
  id: BrassIngot
  name: brass ingot
  description: A softer piece of metal, can be forged at relatively low temperatures.
  components:
  - type: Sprite
    layers:
    - state: ingot_brass
      shader: Emissive
  - type: PhysicalComposition
    materialComposition:
      BrassIngot: 100
  - type: Stack
    stackType: BrassIngot

# Steel - 1260K +- 42K range of error

- type: entity
  abstract: true
  parent: BaseMetallicSteel
  id: SteelOverheatable
  components:
  - type: BurnableFood
    burnTemp: 1302
    burnedFoodPrototype: OverheatedSteel
    burnedPrefix: heated-name-text
    burnSound: null

- type: entity
  parent: [ BaseMetalScraps, BaseMetallicSteel ]
  id: SteelScraps
  name: steel scraps
  description: Needs to be melted in a bloomery to be made useful.
  components:
  - type: Tag
    tags:
    - SteelScraps
  - type: Sprite
    layers:
    - state: steel
      shader: Emissive
  - type: Construction
    graph: SteelScraps

- type: entity
  parent: [ BaseForgeItem, BaseMetallicSteel ]
  id: OverheatedSteel
  name: overheated steel
  description: The metal has overheated and become brittle, smash it apart to make it usable.
  components:
  - type: Damageable
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTypeTrigger
        damageType: Blunt
        damage: 40
      behaviors:
      - !type:SpawnEntitiesBehavior
        offset: 0
        spawn:
          SteelScraps:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Sprite
    layers:
    - state: steelbrittle
      shader: Emissive

- type: entity
  parent: [ BaseWorkableSteel, BaseMetalBloom, SteelOverheatable ]
  id: SteelBloom
  name: steel bloom
  components:
  - type: Sprite
    layers:
    - state: bloomsteel
      shader: Emissive
  - type: Workable
    remaining: 150 # you may want a few of the boys to help you
    result: SteelIngot

- type: entity
  parent: [ BaseMetalIngot, SteelOverheatable ]
  id: SteelIngot
  name: steel ingot
  description: A strong piece of metal, can be forged at moderately high temperatures.
  components:
  - type: Sprite
    layers:
    - state: ingot_steel
      shader: Emissive
  - type: PhysicalComposition
    materialComposition:
      SteelIngot: 100
  - type: Stack
    stackType: SteelIngot
  - type: MetallicTags
    workable: [ IngotWorkable, IngotWorkableSteel ]

