# Base unfinished

- type: entity
  abstract: true
  parent: BaseForgeItem
  id: BaseMetalUnfinished
  components:
  - type: Metallic
    workable: true
  - type: Workable
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ] # broke it into pieces...

- type: entity
  abstract: true
  parent: [ BaseWorkableBrass, BaseMetalUnfinished, BrassOverheatable ]
  id: BaseBrassUnfinishedHot
  description: Finish it by smashing it into shape with a hammer!
  components:
  - type: Workable
    remaining: 100
  - type: Sprite
    layers:
    - state: ingot_brass
      shader: Emissive

- type: entity
  abstract: true
  parent: [ BaseWorkableSteel, BaseMetalUnfinished, SteelOverheatable ]
  id: BaseSteelUnfinishedHot
  description: Finish it by smashing it into shape with a hammer!
  components:
  - type: Workable
    remaining: 150
  - type: Sprite
    layers:
    - state: ingot_steel
      shader: Emissive

- type: entity
  parent: [ BaseWorkablePlasteel, BaseMetalUnfinished, PlasteelOverheatable ]
  id: BasePlasteelUnfinishedHot
  abstract: true
  description: Finish it by smashing it into shape with a hammer!
  components:
  - type: Workable
    remaining: 200
  - type: Sprite
    layers:
    - state: ingot_plasteel
      shader: Emissive

# Base wrought and still hot, needs quenching

- type: entity
  parent: BaseForgeItem
  id: BaseWroughtMetal
  description: Let it cool for a while or quench it.
  # TODO: quenching vs air cooling should matter, heat treatment gameplay
  components:
  - type: Metallic
    minTemp: 353 # 80C, basically stone cold for metals
    idealTemp: 383 # don't heat it up too much or it's hard to work with
    workable: true # need to let it cool now
  - type: MetallicTags
    # set unworkable to the tag needed for a construction step

- type: entity
  abstract: true
  parent: [ BaseWroughtMetal, BrassOverheatable ]
  id: BaseWroughtBrass
  components:
  - type: Sprite
    color: "#e79962"
    layers:
    - state: icon
      shader: Emissive
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#e79962"
        shader: Emissive # FIXME: need to update item inhands temperature as well
      right:
      - state: inhand-right
        color: "#e79962"
        shader: Emissive

- type: entity
  abstract: true
  parent: [ BaseWroughtMetal, SteelOverheatable ]
  id: BaseWroughtSteel
  components:
  - type: Sprite
    color: "#d7dbe9"
    layers:
    - state: icon
      shader: Emissive
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#d7dbe9"
        shader: Emissive
      right:
      - state: inhand-right
        color: "#d7dbe9"
        shader: Emissive

- type: entity
  abstract: true
  parent: [ BaseWroughtMetal, PlasteelOverheatable ]
  id: BaseWroughtPlasteel
  components:
  - type: Sprite
    color: "#dac7f5"
    layers:
    - state: icon
      shader: Emissive
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#dac7f5"
        shader: Emissive
      right:
      - state: inhand-right
        color: "#dac7f5"
        shader: Emissive

