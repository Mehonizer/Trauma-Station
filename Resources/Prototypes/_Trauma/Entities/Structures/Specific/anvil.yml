# TODO: dont use a fucking lathe...
- type: entity
  parent: BaseMachine
  id: AnvilComplete
  name: anvil
  description: Use this to make ingots into the desired creation.
  components:
  - type: Sprite
    sprite: _Trauma/Structures/Forging/anvil.rsi
    state: icon
  - type: MaterialStorage
    whitelist:
      tags:
      - IngotWorkable # have to heat it up to the right temperature
  - type: Lathe
    idleState: icon
    runningState: burning
    staticPacks:
    - AnvilStatic
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 10000
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 3
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: Appearance
  - type: ActivatableUI
    key: enum.LatheUiKey.Key
  - type: UserInterface
    interfaces:
      enum.LatheUiKey.Key:
        type: LatheBoundUserInterface
      enum.ResearchClientUiKey.Key:
        type: ResearchClientBoundUserInterface
  - type: AutomationSlots
    slots:
    - !type:AutomatedMaterialStorage
      input: AutomationSlotMaterials
      output: null
  - type: Animateable
  - type: Construction
    graph: Anvil
    node: anvil
  - type: PlaceableSurface
