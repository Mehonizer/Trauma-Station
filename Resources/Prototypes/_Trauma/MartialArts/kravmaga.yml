- type: entity
  abstract: true
  parent: BaseAction
  id: BaseActionKravMaga
  components:
  - type: Action
    useDelay: 2.5
    raiseOnAction: true
  - type: InstantAction
  - type: Sprite # For guidebook
    sprite: _Goobstation/Actions/kravmaga.rsi

- type: entity
  parent: BaseActionKravMaga
  id: ActionLegSweep
  name: Leg Sweep
  description: Sweeps the legs out from under a target to knock them down for a few seconds.
  components:
  - type: Action
    icon:
      sprite: _Goobstation/Actions/kravmaga.rsi
      state: legsweep
  - type: InstantAction
    event: !type:PerformMartialArtComboEvent
      combo: KravLegSweep
  - type: Sprite
    state: legsweep

- type: entity
  parent: BaseActionKravMaga
  id: ActionNeckChop
  name: Neck Chop
  description: A hard swing with the side of your hand deals some damage and disables the target's ability to speak for twenty seconds.
  components:
  - type: Action
    icon:
      sprite: _Goobstation/Actions/kravmaga.rsi
      state: neckchop
  - type: InstantAction
    event: !type:PerformMartialArtComboEvent
      combo: KravNeckChop
  - type: Sprite
    state: neckchop

- type: entity
  parent: BaseActionKravMaga
  id: ActionLungPunch
  name: Lung Punch
  description: Deals 30 stamina damage and prevents breathing for ten seconds. Four of those will incapacitate a target less-than-lethally, but beware of the loss of breath you cause.
  components:
  - type: Action
    icon:
      sprite: _Goobstation/Actions/kravmaga.rsi
      state: lungpunch
  - type: InstantAction
    event: !type:PerformMartialArtComboEvent
      combo: KravLungPunch
  - type: Sprite
    state: lungpunch

- type: combo
  id: KravLegSweep
  attacks: []
  userEffects:
  - !type:PlaySoundEffect
    sound: /Audio/Weapons/genhit2.ogg
  - !type:PopupMessage
    messages:
    - cqc-slam
  opponentEffects:
  - !type:LegSweep
    time: 4
  levelRequired: 26

- type: combo
  id: KravNeckChop
  attacks: []
  userEffects:
  - !type:PlaySoundEffect
    sound: /Audio/Weapons/genhit2.ogg
  - !type:PopupMessage
    messages:
    - cqc-kick
  opponentEffects:
  - !type:GenericStatusEffect
    key: Stutter
    time: 20
    type: Update
  levelRequired: 26

- type: combo
  id: KravLungPunch
  attacks: []
  userEffects:
  - !type:PopupMessage
    messages:
    - cqc-restrain
  opponentEffects:
  - !type:TakeStaminaDamage
    amount: 30
  - !type:GenericStatusEffect
    key: Stutter
    time: 30
    type: Update
  - !type:BlockedBreathing
    time: 10
  levelRequired: 26
